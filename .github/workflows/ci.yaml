name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-versions:
    name: Check version sync between Devbox and Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check versions
        run: |
          set -euo pipefail

          check_version() {
            local name="$1"
            shift

            declare -A versions
            while [[ $# -gt 0 ]]; do
              versions["$1"]="$2"
              shift 2
            done

            unique=$(printf '%s\n' "${versions[@]}" | sort -u | wc -l)
            if [[ "$unique" -ne 1 ]]; then
              echo "::error::${name} version mismatch detected:"
              for source in "${!versions[@]}"; do
                echo "  ${source}: ${versions[$source]}"
              done
              exit 1
            fi

            echo "All ${name} versions are consistent: ${versions[docker]}"
          }

          check_version "Rust" \
            docker "$(grep -oP '(?<=FROM rust:)[^-]+' Dockerfile)" \
            rust_toolchain "$(grep -oP '(?<=channel = ")[^"]+' rust-toolchain.toml)"

          check_version "pnpm" \
            devbox "$(jq -r '.packages.pnpm' devbox.json)" \
            docker "$(grep -oP '(?<=FROM ghcr.io/pnpm/pnpm:)[^ @]+' Dockerfile | head -n 1)" \
            package_json "$(jq -r '.devEngines.packageManager.version' frontend/package.json | sed 's/[>=]//g')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgres://localhost/follow"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0

      - name: Initialize database
        run: devbox run init_db && devbox services up -b && devbox run create_db && devbox run -- sqlx migrate run

      - name: Format Rust code
        run: devbox run -- cargo fmt --all -- --check

      - name: Lint Rust code
        run: devbox run -- cargo clippy --workspace -- -D warnings

      - name: Run Rust tests
        run: devbox run -- cargo test --workspace --all-features

      - name: Check Rust dependencies for security vulnerabilities
        run: devbox run -- cargo deny check bans licenses sources

      - name: Check peer dependencies
        run: devbox run -- bash -c "cd frontend && pnpm peers check"

      - name: Install frontend dependencies
        run: devbox run -- bash -c "cd frontend && pnpm install --frozen-lockfile"

      - name: Check TypeScript formatting
        run: devbox run -- bash -c "cd frontend && pnpm exec prettier --check ."

      - name: Lint TypeScript
        run: devbox run -- bash -c "cd frontend && pnpm exec eslint . --max-warnings 0"

      - name: Type check TypeScript
        run: devbox run -- bash -c "cd frontend && pnpm exec tsc -b --noEmit"
